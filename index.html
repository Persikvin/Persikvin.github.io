<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persikvin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="math-canvas"></canvas>

    <!-- Плеер -->
    <div class="music-player" id="music-player">
        <div class="player-title">
            <span>Музыкальный Плеер</span>
            <div class="window-controls">
                <div class="control-btn">_</div>
                <div class="control-btn">□</div>
                <div class="control-btn">×</div>
            </div>
        </div>
        <div class="player-content">
            <div class="track-info">
                <div class="track-title" id="current-track">Нет трека</div>
                <div class="track-artist" id="current-artist">Выберите трек</div>
            </div>
            
            <div class="progress-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="time-display">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
            
            <div class="controls">
                <div class="control-button prev" id="prev-btn">⏮</div>
                <div class="control-button play-pause" id="play-pause-btn">▶</div>
                <div class="control-button next" id="next-btn">⏭</div>
            </div>
            
            <div class="volume-container">
                <span style="color: #ff4444; font-size: 12px;">🔊</span>
                <div class="volume-slider" id="volume-slider">
                    <div class="volume-level" id="volume-level"></div>
                </div>
            </div>
            
            <div class="playlist" id="playlist">
                <!-- Плейлист будет заполнен JavaScript -->
            </div>
        </div>
    </div>

    <!-- Окно социальных сетей -->
    <div class="window-xp" id="draggable-window">
        <div class="drag-handle"></div>
        <div class="crack crack-1"></div>
        <div class="crack crack-2"></div>
        <div class="crack crack-3"></div>
        <div class="broken-piece piece-1"></div>
        <div class="broken-piece piece-2"></div>
        <div class="missing-piece missing-1"></div>
        <div class="missing-piece missing-2"></div>
        <div class="window-icon"></div>
        <div class="window-title">
            <span style="margin-left: 20px;">Мои социальные сети</span>
            <div class="window-controls">
                <div class="control-btn">_</div>
                <div class="control-btn">□</div>
                <div class="control-btn">×</div>
            </div>
        </div>
        <div class="window-content">
            <div class="social-links">
                <a href="https://t.me/Persikvin" class="social-link">
                    <div class="social-icon">TG</div>
                    <span>Telegram</span>
                </a>
                <a href="https://www.youtube.com/@Persikvin" class="social-link">
                    <div class="social-icon">YT</div>
                    <span>YouTube</span>
                </a>
                <a href="https://github.com/Persikvin" class="social-link">
                    <div class="social-icon">GH</div>
                    <span>GitHub</span>
                </a>
            </div>
        </div>
    </div>

    <script src="js/math-background.js"></script>
    <script src="js/music-player.js"></script>
    <script src="js/draggable-windows.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
